services:
  - type: web
    name: mini-ai-assistant
    runtime: docker
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard, never commit real keys
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIM
        value: "1536"
    healthCheckPath: /health
